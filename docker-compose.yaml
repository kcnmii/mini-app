services:
  # ── Frontend (Telegram Mini App) ──
  miniapp:
    build:
      context: ./apps/miniapp
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      - api

  # ── API (FastAPI) ──
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - api-data:/app/data
      - ./templates:/app/templates:ro
    env_file:
      - .env
    environment:
      SQLITE_PATH: /app/data/docmini.sqlite3
      DOCGEN_URL: http://docgen:4001
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    depends_on:
      - docgen
      - gotenberg

  # ── Telegram Polling Bot ──
  bot:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: [ "uv", "run", "python", "-m", "app.telegram_bot_runner" ]
    restart: unless-stopped
    volumes:
      - api-data:/app/data
    env_file:
      - .env
    environment:
      SQLITE_PATH: /app/data/docmini.sqlite3
      TELEGRAM_APP_URL: ${TELEGRAM_APP_URL}
    depends_on:
      - api

  # ── Document Generator (docx templating) ──
  docgen:
    build:
      context: ./apps/docgen
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TEMPLATES_ROOT: /app/templates/system
    volumes:
      - ./templates:/app/templates:ro

  # ── Gotenberg (PDF conversion) ──
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped

volumes:
  api-data:
