services:
  # ── Frontend (Telegram Mini App) ──
  miniapp:
    build:
      context: ./apps/miniapp
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      - api

  # ── API (FastAPI) ──
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - api-data:/app/data
      - ./templates:/app/templates:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DOCGEN_URL: http://docgen:4001
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
      docgen:
        condition: service_started
      gotenberg:
        condition: service_started

  # ── Telegram Polling Bot ──
  bot:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: [ "uv", "run", "python", "-m", "app.telegram_bot_runner" ]
    restart: unless-stopped
    volumes:
      - api-data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_APP_URL: ${TELEGRAM_APP_URL}
    depends_on:
      - api

  # ── Database (PostgreSQL) ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-docmini}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-docmini}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Document Generator (docx templating) ──
  docgen:
    build:
      context: ./apps/docgen
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TEMPLATES_ROOT: /app/templates/system
    volumes:
      - ./templates:/app/templates:ro

  # ── Gotenberg (PDF conversion) ──
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped

volumes:
  api-data:
  postgres-data:
