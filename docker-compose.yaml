services:
  # ── Frontend (Telegram Mini App) ──
  miniapp:
    build:
      context: ./apps/miniapp
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      - api

  # ── API (FastAPI) ──
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - api-data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DOCGEN_URL: http://docgen:4001
      SERVICE_URL_GOTENBERG: http://gotenberg:3000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${SERVICE_USER_MINIO:-minio}
      S3_SECRET_KEY: ${SERVICE_PASSWORD_MINIO:-miniosecret}
      S3_BUCKET: ${S3_BUCKET:-doc-mini}
    depends_on:
      postgres:
        condition: service_healthy
      docgen:
        condition: service_started
      gotenberg:
        condition: service_started
      minio:
        condition: service_healthy

  # ── Telegram Polling Bot ──
  bot:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: [ "uv", "run", "python", "-m", "app.telegram_bot_runner" ]
    restart: unless-stopped
    volumes:
      - api-data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_APP_URL: ${TELEGRAM_APP_URL}
      DOCGEN_URL: http://docgen:4001
      SERVICE_URL_GOTENBERG: http://gotenberg:3000
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${SERVICE_USER_MINIO:-minio}
      S3_SECRET_KEY: ${SERVICE_PASSWORD_MINIO:-miniosecret}
      S3_BUCKET: ${S3_BUCKET:-doc-mini}
    depends_on:
      - api

  # ── Database (PostgreSQL) ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-docmini}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-docmini}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Document Generator (docx templating) ──
  docgen:
    build:
      context: ./apps/docgen
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TEMPLATES_ROOT: /app/templates/system

  # ── Gotenberg (PDF conversion) ──
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped

  # ── MinIO (S3 Object Storage) ──
  minio:
    image: 'minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1'
    restart: unless-stopped
    command: 'server /data --console-address ":9001"'
    environment:
      - MINIO_SERVER_URL=${MINIO_SERVER_URL:-}
      - MINIO_BROWSER_REDIRECT_URL=${MINIO_BROWSER_REDIRECT_URL:-}
      - MINIO_ROOT_USER=${SERVICE_USER_MINIO:-minio}
      - MINIO_ROOT_PASSWORD=${SERVICE_PASSWORD_MINIO:-miniosecret}
    volumes:
      - 'minio-data:/data'
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://localhost:9000/minio/health/live'
      interval: 5s
      timeout: 20s
      retries: 10

  # ── MinIO Init (Creates default bucket) ──
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc config host add myminio http://minio:9000 ${SERVICE_USER_MINIO:-minio} ${SERVICE_PASSWORD_MINIO:-miniosecret} && /usr/bin/mc mb myminio/${S3_BUCKET:-doc-mini} --ignore-existing && /usr/bin/mc anonymous set public myminio/${S3_BUCKET:-doc-mini} "

volumes:
  api-data:
  postgres-data:
  minio-data:
